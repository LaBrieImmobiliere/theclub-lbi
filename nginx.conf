server {
    listen 80;
    server_name VOTRE_DOMAINE.fr www.VOTRE_DOMAINE.fr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name VOTRE_DOMAINE.fr www.VOTRE_DOMAINE.fr;

    ssl_certificate /etc/letsencrypt/live/VOTRE_DOMAINE.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/theclub.access.log;
    error_log /var/log/nginx/theclub.error.log;

    # Fichiers statiques Next.js directement via Nginx (plus performant)
    location /_next/static/ {
        alias /var/www/theclub/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /var/www/theclub/public/;
        expires 30d;
    }

    # Proxy vers Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}
